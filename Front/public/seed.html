<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catsgram - Seed Database</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.5;
        }
        h1 { color: #6366f1; margin: 0 0 8px 0; }
        .subtitle { color: #888; margin: 0 0 24px 0; font-size: 14px; }
        .btn {
            background: #6366f1;
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px 10px 0;
            transition: background 0.2s;
        }
        .btn:hover:not(:disabled) { background: #5558e3; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }

        #output {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #6366f1; }
        .warning { color: #f59e0b; }

        .stats {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .stats.show { display: grid; }
        .stat-card {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .stat-value { font-size: 24px; font-weight: 700; color: #6366f1; }
        .stat-label { font-size: 12px; color: #888; }

        .loading {
            display: none;
            color: #f59e0b;
            margin: 16px 0;
            font-weight: 500;
        }
        .loading.show { display: block; }

        @media (max-width: 700px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .btn { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>
<h1>🌱 Catsgram Seed Database</h1>
<p class="subtitle">10 пользователей • 60 постов • ~180 лайков • ~120 комментариев</p>

<button class="btn" id="seedBtn">🚀 Запустить заполнение</button>
<button class="btn btn-danger" id="clearBtn">🗑️ Очистить</button>

<div class="loading" id="loading">⏳ Заполнение... Пожалуйста, подождите (может занять 1-2 минуты)</div>

<div class="stats" id="stats">
    <div class="stat-card"><div class="stat-value" id="statUsers">0</div><div class="stat-label">Пользователей</div></div>
    <div class="stat-card"><div class="stat-value" id="statPosts">0</div><div class="stat-label">Постов</div></div>
    <div class="stat-card"><div class="stat-value">~180</div><div class="stat-label">Лайков</div></div>
    <div class="stat-card"><div class="stat-value">~120</div><div class="stat-label">Комментариев</div></div>
</div>

<div id="output">Нажми "🚀 Запустить заполнение" для начала...</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const API_BASE_URL = 'http://localhost:8080';

    // ========== УТИЛИТЫ ==========
    function log(message, type = '') {
        console.log(message);
        const output = document.getElementById('output');
        const line = document.createElement('div');
        line.textContent = typeof message === 'string' ? message : JSON.stringify(message);
        if (type) line.className = type;
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
    }

    function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function apiRequest(endpoint, options = {}) {
        try {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                headers: { 'Content-Type': 'application/json', ...options.headers },
                ...options,
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }

            if (response.status === 204) return null;
            return await response.json();
        } catch (error) {
            log(`❌ Ошибка ${endpoint}: ${error.message}`, 'error');
            throw error;
        }
    }

    // ========== КОНТЕНТ ==========
    const USER_DATA = [
        { username: 'cat_lover', displayName: 'Котейка', bio: '🐱 Люблю котиков и всё что с ними связано!' },
        { username: 'kitty_queen', displayName: 'Мурлыка', bio: 'Просто котик в мире людей 😻' },
        { username: 'fluffy_paws', displayName: 'Пушистик', bio: 'Мур-мур и только мур 🐾' },
        { username: 'meow_master', displayName: 'Котофей', bio: 'Котомания — это диагноз 😸' },
        { username: 'purrfect_day', displayName: 'Мяу-Мастер', bio: 'Живу ради следующего перекуса 🍽️' },
        { username: 'whiskers_wonder', displayName: 'Лапки', bio: 'Профессиональный лежебока 💤' },
        { username: 'paw_patrol', displayName: 'Хвостик', bio: 'Исследователь коробок 📦' },
        { username: 'feline_fine', displayName: 'Усатик', bio: 'Мастер по погладушкам ✋' },
        { username: 'cat_nap', displayName: 'Ночной Кот', bio: 'Ночной патрульный 🌙' },
        { username: 'nine_lives', displayName: 'Солнечный Кот', bio: 'Эксперт по мурчанию 🔊' },
    ];

    const POST_TEXTS = [
        'Только что проснулся и уже хочу есть! 🍽️',
        'Кто тоже любит спать по 16 часов в сутки? 🛌',
        'Нашёл идеальное место для сна ☀️',
        'Моя новая игрушка — это просто восторг! 🧶',
        'Почему люди не понимают что 3 утра — время для игр? 🌙',
        'Смотрю в окно уже 2 часа. Там птичка. 🐦',
        'Мой человек снова работает. Когда же он будет гладить меня? 😿',
        'Только что уронил чашку со стола. Это было искусство. 🎨',
        'Коробка > дорогая лежанка. Факты. 📦',
        'Мур-мур-мур. Перевод: я доволен. 😻',
        'Почему ванная комната закрывается когда я хочу зайти? 🚪',
        'Только что увидел своё отражение и испугался. Потом понял что это я. 😼',
        'Лазерная указка — величайшее изобретение человечества! 🔴',
        'Сегодняшний план: есть, спать, повторить. 🔄',
        'Мой хвост живёт своей жизнью и я это поддерживаю. 🐈',
        'Зашёл в комнату и забыл зачем. Классика. 🤔',
        'Только что проигнорировал зов человека. Это была месть. 😤',
        'Обнаружил что если сидеть на клавиатуре — человек обращает внимание! ⌨️',
        'Мяу? Мяу! Мяу. (Это была глубокая философия) 🧠',
        'Пятница! Время требовать больше вкусняшек! 🎉',
        'Обнимашки с подушкой — лучший способ начать день 🛏️',
        'Кто сказал что коты не умеют танцевать? 💃',
        'Только что съел то, что не должен был. Не жалею. 😏',
        'Мой новый любимый звук — открывающаяся банка корма 🥫',
        'Солнечный зайчик на стене — мой главный враг и друг ☀️',
        'Почему двери закрываются? Это заговор! 🚪',
        'Только что сделал сальто с дивана. 10/10, рекомендую. 🤸',
        'Мурчание — это мой способ сказать "ты молодец" 😊',
        'Обнаружил что если смотреть в глаза — человек даёт еду. Работает! 👀',
        'Сегодняшний вызов: уместиться в самой маленькой коробке. Успех! 📦',
    ];

    const COMMENT_TEXTS = [
        'Мур-мур! 😻', 'Согласен на 100%! 🐾', 'Это гениально! 🧠',
        'Мой кот тоже так делает! 😸', 'Лучший пост сегодня! ⭐',
        'Мур-мур-мур! 🔊', 'Поддерживаю! ✋', 'Классика жанра! 🎭',
        'Жиза! 💯', '🐱❤️', 'Обожаю это! 😍', 'Точно про моего кота! 🎯',
        'Смешно до слёз! 😂', 'Мур! (это комплимент) ✨', 'Записал в заметки 📝',
    ];

    // ========== ФУНКЦИИ API ==========
    async function createUser(username, email, password, displayName, bio) {
        log(`📝 Создание: @${username}...`);
        const user = await apiRequest('/users', {
            method: 'POST',
            body: JSON.stringify({ username, email, password, displayName, bio }),
        });
        log(`✅ @${user.username} (ID: ${user.id})`, 'success');
        await delay(randomInt(50, 150));
        return user;
    }

    async function createPost(authorId, description) {
        const post = await apiRequest('/posts', {
            method: 'POST',
            body: JSON.stringify({ authorId, description }),
        });
        await delay(randomInt(30, 80));
        return post;
    }

    async function addLike(postId, userId) {
        await apiRequest(`/posts/${postId}/likes`, {
            method: 'POST',
            body: JSON.stringify({ userId }),
        });
        await delay(randomInt(20, 50));
    }

    async function addComment(postId, authorId, text) {
        await apiRequest(`/posts/${postId}/comments`, {
            method: 'POST',
            body: JSON.stringify({ authorId, text }),
        });
        await delay(randomInt(20, 50));
    }

    // ========== MAIN ==========
    async function runSeed() {
        const seedBtn = document.getElementById('seedBtn');
        const loading = document.getElementById('loading');
        const stats = document.getElementById('stats');

        loading.classList.add('show');
        seedBtn.disabled = true;
        document.getElementById('output').innerHTML = '';

        log('🌱 ========== НАЧАЛО ЗАПОЛНЕНИЯ ==========\n', 'info');
        log('📊 План: 10 пользователей, 60 постов, ~180 лайков, ~120 комментариев\n', 'info');

        try {
            // ===== 1. Пользователи =====
            log('\n📌 Шаг 1: Создание 10 пользователей...\n', 'info');
            const users = [];

            for (let i = 0; i < 10; i++) {
                const data = USER_DATA[i];
                const password = `pass${randomInt(1000, 9999)}`;
                const user = await createUser(
                    data.username,
                    `${data.username}@catsgram.com`,
                    password,
                    data.displayName,
                    data.bio
                );
                user.password = password; // сохраняем для вывода
                users.push(user);
            }

            // ===== 2. Посты (60 штук) =====
            log('\n📌 Шаг 2: Создание 60 постов...\n', 'info');
            const posts = [];

            for (let i = 0; i < 60; i++) {
                const author = randomItem(users);
                const text = randomItem(POST_TEXTS);
                const post = await createPost(author.id, text);
                posts.push({ ...post, author });

                if ((i + 1) % 15 === 0) {
                    log(`📈 Посты: ${i + 1}/60 создано`, 'info');
                }
            }

            // ===== 3. Лайки (3 на пост) =====
            log('\n📌 Шаг 3: Добавление ~180 лайков...\n', 'info');

            for (let i = 0; i < posts.length; i++) {
                const post = posts[i];
                const potentialLikers = users.filter(u => u.id !== post.author.id);

                for (let j = 0; j < 3 && potentialLikers.length > 0; j++) {
                    const idx = Math.floor(Math.random() * potentialLikers.length);
                    const liker = potentialLikers.splice(idx, 1)[0];
                    await addLike(post.id, liker.id);
                }

                if ((i + 1) % 20 === 0) {
                    log(`❤️ Лайки: ${i + 1}/60 постов`, 'info');
                }
            }

            // ===== 4. Комментарии (2 на пост) =====
            log('\n📌 Шаг 4: Добавление ~120 комментариев...\n', 'info');

            for (let i = 0; i < posts.length; i++) {
                const post = posts[i];

                for (let j = 0; j < 2; j++) {
                    const commenter = randomItem(users);
                    const text = randomItem(COMMENT_TEXTS);
                    await addComment(post.id, commenter.id, text);
                }

                if ((i + 1) % 20 === 0) {
                    log(`💬 Комментарии: ${i + 1}/60 постов`, 'info');
                }
            }

            // ===== 5. Статистика =====
            log('\n📌 Шаг 5: Проверка данных...\n', 'info');
            const [allUsers, allPosts] = await Promise.all([
                apiRequest('/users'),
                apiRequest('/posts?from=0&size=100'),
            ]);

            log('\n📊 ========== ИТОГИ ==========\n', 'info');
            log(`👥 Пользователей: ${allUsers.length}`, 'success');
            log(`📝 Постов: ${allPosts.length}`, 'success');

            if (allPosts[0]) {
                const [likes, comments] = await Promise.all([
                    apiRequest(`/posts/${allPosts[0].id}/likes`),
                    apiRequest(`/posts/${allPosts[0].id}/comments`),
                ]);
                log(`❤️ Лайков на тестовом посту: ${likes.length}`, 'success');
                log(`💬 Комментариев: ${comments.length}`, 'success');
            }

            // Показываем статистику и аккаунты
            stats.classList.add('show');
            document.getElementById('statUsers').textContent = allUsers.length;
            document.getElementById('statPosts').textContent = allPosts.length;

            log('\n🌱 ========== ГОТОВО! ==========\n', 'info');
            log('✅ База заполнена!\n', 'success');
            log('📧 Тестовые аккаунты:', 'info');
            users.slice(0, 5).forEach(u => {
                log(`   ${u.email} / ${u.password}`, 'info');
            });

        } catch (error) {
            log('\n❌ ========== ОШИБКА ==========\n', 'error');
            log(error.message, 'error');
            log('\n💡 Убедись что:', 'warning');
            log('   1. Бэкенд запущен на порту 8080', 'warning');
            log('   2. На контроллерах есть @CrossOrigin', 'warning');
            log('   3. База данных PostgreSQL доступна', 'warning');
        } finally {
            loading.classList.remove('show');
            seedBtn.disabled = false;
        }
    }

    // ========== EVENT LISTENERS ==========
    document.getElementById('seedBtn').addEventListener('click', runSeed);
    document.getElementById('clearBtn').addEventListener('click', () => {
        document.getElementById('output').innerHTML = 'Очищено. Нажми "🚀 Запустить заполнение" для начала...';
        document.getElementById('stats').classList.remove('show');
    });

    // Авто-проверка подключения при загрузке
    window.addEventListener('load', async () => {
        try {
            const test = await fetch(`${API_BASE_URL}/posts?from=0&size=1`, { method: 'GET' });
            if (test.ok) {
                log('✅ Бэкенд доступен на ' + API_BASE_URL, 'success');
            }
        } catch {
            log('⚠️ Бэкенд не отвечает. Проверь что он запущен на порту 8080', 'warning');
        }
    });
</script>
</body>
</html>
