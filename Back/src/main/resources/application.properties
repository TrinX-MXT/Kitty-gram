server.port=8080

spring.datasource.url=jdbc:h2:mem:catsgram;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.sql.init.mode=always

app.image-directory=./images

# Simple master/slave demo (both point to same in-memory DB for local testing)
spring.datasource.slave.url=jdbc:h2:mem:catsgram;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.slave.driverClassName=org.h2.Driver
spring.datasource.slave.username=sa
spring.datasource.slave.password=

# JWT config (simple, for demo purposes)
app.security.jwt.secret=replace-me-with-a-long-random-string
app.security.jwt.expiration-ms=3600000
